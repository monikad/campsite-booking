    # Reservations ---------------------------------------------------------------------
    /reservations:
        get:
            tags:
                - Reservations
            summary: Retrieves all reservations matching given dates
            description: Retrieves all reservations matching given dates. Limit is set to 50 request/second.
            operationId: getReservations
            parameters:
                - name: dateFrom
                  in: query
                  description: Initial date of reservations report Eg. 2023-02-06
                  required: true
                  schema:
                      type: string
                - name: dateTo
                  in: query
                  description: Max date of reservations report Eg. 2023-02-06
                  required: true
                  schema:
                      type: string
                - name: limit
                  in: query
                  description: Max expected number of results
                  schema:
                      type: number
                      default: 10.0
                - name: page
                  in: query
                  description: number of pages to be skipped
                  schema:
                      type: string
                      default: '0'
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    data:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Reservation'
                                    total_results:
                                        type: integer
components:
    securitySchemes:
        Apikey:
            type: apiKey
            in: header
            name: apikey
    schemas:
        Activity:
            type: object
            required:
                - ActivityID
                - ActivityParentID
                - ActivityName
                - ActivityLevel
            properties:
                ActivityID:
                    type: integer
                    description: Activity ID
                    example: 11
                ActivityParentID:
                    type: integer
                    description: ParentID of the related Actitvity
                    example: 0
                ActivityName:
                    type: string
                    maxLength: 60
                    description: Name of the activity
                    example: FISHING
                ActivityLevel:
                    type: integer
                    description: Amount of physical exertion to be expected for a given activity such as hiking, swimming, etc
                    example: 0
        Attribute:
            type: object
            required:
                - AttributeName
                - AttributeValue
            properties:
                AttributeID:
                    type: integer
                    description: Attribute ID
                AttributeName:
                    type: string
                    maxLength: 60
                    description: Attribute name
                AttributeValue:
                    type: string
                    maxLength: 255
                    description: Attribute value
        Campsite:
            type: object
            required:
                - CampsiteID
                - FacilityID
                - CampsiteName
                - CampsiteType
                - TypeOfUse
                - Loop
                - CampsiteAccessible
                - ATTRIBUTES
                - PERMITTEDEQUIPMENT
                - ENTITYMEDIA
                - CreatedDate
                - LastUpdatedDate
            properties:
                CampsiteID:
                    type: string
                    description: Campsite ID
                FacilityID:
                    type: string
                    description: Facility ID the campsite belongs to
                CampsiteName:
                    type: string
                    maxLength: 255
                    description: Campsite name
                CampsiteType:
                    type: string
                    maxLength: 255
                    description: Campsite type
                TypeOfUse:
                    type: string
                    maxLength: 255
                    description: Type of use
                Loop:
                    type: string
                    maxLength: 255
                    description: Name of loop the campsite resides on
                CampsiteAccessible:
                    type: boolean
                    description: Is the campsite accessible by vehicle
                CampsiteLongitude:
                    type: number
                    description: Longitude of the permit
                    format: double
                    example: -118.0186111
                CampsiteLatitude:
                    type: number
                    description: Latitude of the permit
                    format: double
                    example: 44.6969444
                CreatedDate:
                    allOf:
                        - $ref: '#/components/properties/CreatedDate'
                LastUpdatedDate:
                    allOf:
                        - $ref: '#/components/properties/LastUpdatedDate'
                ATTRIBUTES:
                    type: array
                    items:
                        $ref: '#/components/schemas/Attribute'
                    description: Array of Campsite Attributes
                PERMITTEDEQUIPMENT:
                    type: array
                    description: Array of Permitted Equipment allowed in the Campsite
                    items:
                        $ref: '#/components/schemas/Permitted Equipment'
                ENTITYMEDIA:
                    type: array
                    items:
                        $ref: '#/components/schemas/Media'
                    description: Array of Media for the Campsite
        Event:
            type: object
            required:
                - EventID
                - EventName
                - ResourceLink
            properties:
                EventID:
                    type: string
                    description: Event ID
                EventName:
                    type: string
                    maxLength: 60
                    description: Full name of the Event
                ResourceLink: &ResourceLink
                    type: string
                    description: Internet address (URL) to a web site providing details
                    format: url
        Facility:
            type: object
            required:
                - FacilityID
                - LegacyFacilityID
                - OrgFacilityID
                - FacilityName
                - FacilityDescription
                - FacilityTypeDescription
                - FacilityUseFeeDescription
                - FacilityDirections
                - FacilityAccessibilityText
                - FacilityPhone
                - FacilityEmail
                - FacilityReservationURL
                - FacilityMapURL
                - FacilityAdaAccess
                - GEOJSON
                - FacilityLongitude
                - FacilityLatitude
                - StayLimit
                - Keywords
                - Reservable
                - Enabled
                - LastUpdatedDate
            properties:
                FacilityID:
                    type: string
                    description: RIDB unique Facility ID
                    example: '233115'
                LegacyFacilityID:
                    type: string
                    description: Legacy Facility ID
                    example: '71992'
                OrgFacilityID:
                    type: string
                    description: The agency's internal Facility ID provided to the RIDB by the agency
                    example: 'AN371992'
                ParentOrgID:
                    type: string
                    description: The parent Organization ID
                    example: '131'
                ParentRecAreaID:
                    type: string
                    description: The parent RecArea ID
                    example: '1113'
                FacilityName:
                    type: string
                    maxLength: 256
                    description: Full name of the Facility
                    example: UNION CREEK CAMPGROUND
                FacilityDescription:
                    type: string
                    maxLength: 4000
                    description: Text describing the main features of the Facility
                    example: >-
                        <h2>Overview:</h2>The Union Creek Campground is one of the largest Forest Service campgrounds in eastern Oregon. It's nestled on the northern shore of Phillips Reservoir amid mature
                        Ponderosa pine, with a few sites offering views of the lake.<br /><br />

                        This camp is part of the Union Creek Recreation Area, which includes a picnic and day-use area. Union Creek Campground is set on three loops with separate walk-in tent
                        camping, and it has four group sites that can accommodate from 60-100 people.<h4>Natural Features:</h4>Phillips Reservoir is a popular destination within the Wallowa-Whitman National Forest because it offers scenic views of the surrounding Elkhorn Mountains. The
                        shoreline is forested with a mix of Ponderosa pine and various firs interspersed with small grasslands.<br /><br />

                        Visitors enjoy several varieties of colorful wildflowers in the spring.<h4>Recreation:</h4>The campground is near a boat launch and a small, rocky swim beach. Activities include swimming, fishing, boating and water
                        skiing.<br /><br />

                        Anglers can fish for bass, trout and perch. There's an access point for the Phillips Lake Shoreline Trail, a 6.5-mile scenic trail for hiking and mountain biking.<h4>Facilities:</h4>The parking spurs are paved and gravel and large enough for any size RV. Several sites offer full hookups, and some others offer water and electric.<br /><br />

                        Units are equipped with picnic tables and grills. Drinking water and flush toilets are available.
                        Some of the facilities are handicap-accessible.<h4>Nearby Attractions:</h4>The historic gold mining town of Sumpter is about 10 miles away. Visitors can explore the Sumpter Dredge State Heritage Park, browse the holiday weekend flea
                        markets or take a ride on a historic steam locomotive.
                FacilityTypeDescription:
                    maxLength: 1024
                    type: string
                    description: Description of the type of Facility
                    example: Campground
                FacilityUseFeeDescription:
                    type: string
                    description: Text describing monetary charges associated with entrance to or usage of the Facility
                    example: ''
                FacilityDirections:
                    type: string
                    maxLength: 4000
                    description: Text that provides general directions and/or the general location of the Facility
                    example: From Baker City, Oregon, travel south on Highway 7 for about 18 miles. The campground and day-use entrance is signed on the left side of the road. Follow the signs in the Union Creek Recreation Area down to the various campground loops and areas.
                FacilityAccessibilityText:
                    type: string
                    maxLength: 4000
                    description: Text that provides general details about accessibility at the facility
                    example: Facility contains wheelchair accessable restrooms.
                FacilityPhone:
                    type: string
                    maxLength: 256
                    description: Phone number of the Facility
                    example: 541-894-2332
                FacilityEmail:
                    type: string
                    maxLength: 60
                    description: Email address of the Facility
                    format: email
                    example: campgrounds@anthonylakes.com
                FacilityReservationURL:
                    type: string
                    maxLength: 256
                    description: Internet address (URL) for the web site hosting the reservation system
                    format: url
                    example: ''
                FacilityMapURL:
                    type: string
                    maxLength: 256
                    description: Internet address (URL) that hosts the Facility map
                    format: url
                    example: ''
                FacilityAdaAccess:
                    type: string
                    maxLength: 1024
                    description: Information about the Americans with Disabilities Act accessibility for the Facility
                    example: 'N'
                GEOJSON:
                    allOf:
                        - $ref: '#/components/properties/GeoJSON'
                FacilityLongitude:
                    type: number
                    description: Longitude in decimal degrees -180.0 to 180.0
                    format: double
                    example: -118.0186111
                FacilityLatitude:
                    type: number
                    description: Latitude in decimal degrees -90.0 to 90.0
                    format: double
                    example: 44.6969444
                StayLimit:
                    type: string
                    maxLength: 500
                    description: Details on the stay limits for the Facility
                    example: ''
                Keywords:
                    type: string
                    maxLength: 4000
                    description: List of keywords for the Facility
                    example: NW02,Phillips Reservoir
                Reservable:
                    type: boolean
                    example: false
                    description: Whether the Facility is reservable
                Enabled:
                    type: boolean
                    example: true
                    description: Whether the Facility is enabled
                LastUpdatedDate:
                    allOf:
                        - $ref: '#/components/properties/LastUpdatedDate'
                CAMPSITE:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility Campsite'
                PERMITENTRANCE:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility Permit Entrance'
                TOUR:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility Tour'
                ORGANIZATION:
                    type: array
                    items:
                        $ref: '#/components/schemas/Organization'
                RECAREA:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility RecArea'
                FACILITYADDRESS:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility Address'
                ACTIVITY:
                    type: array
                    items:
                        $ref: '#/components/schemas/Facility Activity'
                EVENT:
                    type: array
                    items:
                        $ref: '#/components/schemas/Event'
                LINK:
                    type: array
                    items:
                        $ref: '#/components/schemas/Link'
                MEDIA:
                    type: array
                    items:
                        $ref: '#/components/schemas/Media'
        Facility Activity:
