---
openapi: 3.0.0
info:
    title: RIDB API
    description: >-
        The Recreation Information Database (RIDB) provides data resources to citizens, offering a single point of access to information about recreational opportunities nationwide. The RIDB represents an authoritative source of information and services for millions of visitors to federal lands, historic sites, museums, and other attractions/resources. This initiative integrates multiple Federal channels and sources about recreation opportunities into a one-stop, searchable database of recreational areas nationwide.
    version: 1.0.0
servers:
    - url: RIDB_HOST/api/v1
      description: RIDB API 1.0
tags:
    - name: Activities
      description: Activities are associated to RecAreas and facilities. Examples are climbing, boating, and camping.
    - name: Attributes
    - name: Campsites
      description: Campsites are associated to parent facilities.
    - name: Events
      description: Events are associated to either RecAreas or facilities. Examples are Salmon Festivals, Halloween in the Park, Balloon Festivals, Environmental Fairs, and Fishing tournaments.
    - name: Facilities
      description: Facilities are points of interest within recreations areas. Facilities can also “stand on their own” without a parent RecArea. Facilities can also be comprised of or more child facilities. Examples are a ranger station, hotel, campground or trail. Facilities can also be areas within larger facilities. Example is Alamo National Park that resides within the Alamo Lake RecArea. Facilities can also be reservable or non-reservable.
    - name: Facility Addresses
    - name: Links
      description: Links are hyperlinks that provide information associated with a RecArea or facility. Link type examples are official websites, local partnerships, concessionaires, Flickr, Facebook, YouTube channels, Google+, and Twitter.
    - name: Media
      description: Media is hyperlinks to either images or video associated with a RecArea, facility or campsite.
    - name: Organizations
      description: RIDB organizations are the federal agencies that provide RIDB data.
    - name: Permit Entrances
      description: Permit entrances are associated to parent facilities.
    - name: Recreation Areas
      description: Recreation areas are large tracts of federal land for the purpose of, you guessed it, recreating! Recreation areas have many distinguishing characteristics (attributes) ranging from addresses, organizations, links, media links, activities, etc. Recreation areas can contain one to many child facilities. Recreation area examples are Yosemite National Park and the Aldo Leopold Wilderness.
    - name: Recreation Area Addresses
    - name: Tours
      description: Tours are associated to parent facilities. Tours can also be members of parent tour packages as denoted by the “membertours” attribute.
security:
    - Apikey: []
paths:
    # Organizations ------------------------------------------------------------
    /organizations:
        get:
            tags: &OrgTags
                - Organizations
            summary: Retrieve all organizations
            description: This endpoint retrieves all organizations. Rate Limit is set to 50 request/second.
            operationId: getOrganizations
            parameters:
                - allOf:
                      - $ref: '#/components/parameters/QueryParam'
                      - description: Query filter criteria, searches on organization name and organization abbreviated name
                - &LimitParam
                  description: Number of records to return (max 50)
                  in: query
                  name: limit
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 50
                      default: 50
                - &OffsetParam
                  description: Start record of overall result set
                  in: query
                  name: offset
                  schema:
                      type: integer
                      minimum: 0
                      default: 0
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    RECDATA:
                                        type: array
                                        items:
                                            $ref: '#/components/schemas/Organization'
                                    METADATA:
                                        allOf:
                                            - $ref: '#components/properties/SearchResponseMetadata'
                '401': &UnauthorizedResponse
                    description: Unauthorized
    /organizations/{orgId}:
        get:
            tags: *OrgTags
            summary: Retrieve a specific organization by id
            description: This endpoint retrieves a specific organization. Rate Limit is set to 50 request/second.
            operationId: getOrganization
            parameters:
                - &OrgIDParam
                  description: Id of the organization
                  in: path
                  name: orgId
                  schema:
                      type: string
                  required: true
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Organization'
                '401': *UnauthorizedResponse
    # RecAreas -----------------------------------------------------------------
    /recareas:
        get:
            tags: &RecAreaTags
                - Recreation Areas
            summary: Retrieve all RecAreas
            description: This endpoint retrieves all RecAreas. Rate Limit is set to 50 request/second.
            operationId: getRecAreas
            parameters:
                - allOf:
                      - $ref: '#/components/parameters/QueryParam'
                      - description: Query filter criteria. Searches on RecArea name, description, keywords, and stay limit
                - *LimitParam
                - *OffsetParam
                - &FullParam
                  description: Return the full record details or compact (abbreviated) details
                  in: query
                  name: full
                  schema:
                      type: string
                      enum: [true, false]
                - &StateParam
                  description: Comma delimited list of 2 character state codes
                  in: query
                  name: state
                  schema:
                      type: array
                      items:
                          type: string
                  style: simple
                  example: [CO, VA, NC]
                - &ActivityParam
                  description: Comma delimited list of activity IDs or keyword
                  in: query
                  name: activity
                  schema:
                      type: array
                      items:
                          type: string
                  style: simple
                  example: ['6', BOATING]
                - &LatitudeParam
                  description: Latitude of the point in decimal degrees
                  in: query
                  name: latitude
                  schema:
                      type: number
                      format: double
                  example: -118.0186111
                - &LongitudeParam
                  description: Longitude of the point in decimal degrees
                  in: query
                  name: longitude
                  schema:
                      type: number
                      format: double
                  example: 43.88037021
                - &RadiusParam
                  description: Distance (in miles) by which to include search results
                  in: query
                  name: radius
                  schema:
                      type: number
                      format: double
                      minimum: 0
                      maximum: 25
                      default: 25
                  example: 9.75
                - &LastUpdatedParam
                  description: 'Return all records modified since this date **Date Format: (mm-dd-yyyy)**'
                  in: query
                  name: lastupdated
                  schema:
                      type: string
                  example: 10-01-2018
                - &SortParam
                  description: Sort the results by "ID", "Date" or "Name"
                  in: query
                  name: sort
                  schema:
                      type: string
            responses:
                '200': &RecAreasResponse
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    RECDATA:
                                        type: array
                                        items:
