                    example: MORU
                ParentOrgID:
                    type: string
                    description: Parent Organization ID
                    example: '128'
                RecAreaName:
                    type: string
                    maxLength: 256
                    description: Full name of the RecArea
                    example: Mount Rushmore National Memorial
                RecAreaDescription:
                    type: string
                    maxLength: 4000
                    description: Text that describes the RecArea
                    example: Majestic figures of George Washington, Thomas Jefferson, Theodore Roosevelt and Abraham Lincoln, surrounded by the beauty of the Black Hills of South Dakota, tell the story of the birth, growth, development and preservation of this country. From the history of the first inhabitants to the diversity of America today, Mount Rushmore brings visitors face to face with the rich heritage we all share.
                RecAreaFeeDescription:
                    type: string
                    description: Text describing monetary charges associated with entrance to or usage of a RecArea
                    example: ''
                RecAreaDirections:
                    type: string
                    maxLength: 4000
                    description: Directions to the RecArea
                    example: Visitors traveling by car from the East use Exit 61 off I-90 follow signs. Coming from the West use exit 57 exit at Rapid City and follow U.S. Highway 16 southwest to Keystone and then Highway 244 to Mount Rushmore. Visitors coming from the south should follow Highway 385 north to Highway 244, which is the road leading to the memorial.
                RecAreaAccessibilityText:
                    type: string
                    maxLength: 4000
                    description: Text that provides general details about accessibility at the recreation area
                    example: Recreation area contains wheelchair accessible restrooms.
                RecAreaPhone:
                    type: string
                    maxLength: 256
                    description: Phone number for RecArea
                    example: (605) 574-2523
                RecAreaEmail:
                    type: string
                    maxLength: 256
                    description: Email address of the RecArea
                    format: email
                    example: ed_menard@nps.gov
                RecAreaReservationURL:
                    type: string
                    maxLength: 256
                    description: Internet address (URL) for the web site hosting the reservation system
                    format: url
                    example: ''
                RecAreaMapURL:
                    type: string
                    maxLength: 256
                    description: Internet address (URL) that hosts the RecArea map
                    format: url
                    example: ''
                GEOJSON:
                    allOf:
                        - $ref: '#/components/properties/GeoJSON'
                RecAreaLongitude:
                    type: number
                    description: Longitude in decimal degrees -180.0 to 180.0
                    format: double
                    example: -103.4525186
                RecAreaLatitude:
                    type: number
                    description: Latitude in decimal degrees -90.0 to 90.0
                    format: double
                    example: 43.88037021
                StayLimit:
                    type: string
                    maxLength: 500
                    description: Details on the stay limits for the RecArea
                    example: ''
                Keywords:
                    type: string
                    maxLength: 4000
                    description: List of keywords for the RecArea
                    example: Mount Rushmore National Memorial
                Reservable:
                    type: boolean
                    example: false
                    description: Whether the RecArea is reservable
                Enabled:
                    type: boolean
                    example: true
                    description: Whether the RecArea is enabled
                LastUpdatedDate:
